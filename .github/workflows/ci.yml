name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test and eval
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --basetemp cache/pytest-ci -o cache_dir=cache/pytest-cache-ci

      - name: Run harness evaluation gate
        run: python -m evaluation.harness_eval --out-dir cache/harness-eval-ci

      - name: Upload harness evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-eval-report
          path: cache/harness-eval-ci/

  desktop:
    name: Desktop Spotlight smoke
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run desktop runtime tests
        run: python -m pytest tests/test_desktop_runtime.py tests/test_desktop_entrypoint.py --basetemp cache/pytest-desktop-ci -o cache_dir=cache/pytest-cache-desktop-ci

      - name: Verify canonical desktop command
        run: python -m src.desktop --help

      - name: Smoke test desktop window
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci_desktop_smoke.ps1

  docker:
    name: Build production image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, desktop]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test production image
        run: python scripts/ci_container_smoke.py --image "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push verified image
        if: github.event_name == 'push'
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          DIGEST="$(docker buildx imagetools inspect "${IMAGE_NAME}:${GITHUB_SHA}" --format '{{json .Manifest.Digest}}')"
          DIGEST="${DIGEST%\"}"
          DIGEST="${DIGEST#\"}"
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${IMAGE_NAME}@${DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
