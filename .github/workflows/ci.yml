name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and eval
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --basetemp cache/pytest-ci -o cache_dir=cache/pytest-cache-ci

      - name: Run harness evaluation gate
        run: python -m evaluation.harness_eval --out-dir cache/harness-eval-ci

      - name: Upload harness evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-eval-report
          path: cache/harness-eval-ci/

  docker:
    name: Build production image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
