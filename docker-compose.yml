services:
  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      CIS_DATA_DIR: /data
      CIS_REPOSITORY_NAME: ${CIS_REPOSITORY_NAME:-project1}
      CIS_REPOSITORY_PATH: /repos/project1
      CIS_JWT_SECRET: ${CIS_JWT_SECRET:?set CIS_JWT_SECRET}
      CIS_JWT_ISSUER: ${CIS_JWT_ISSUER:-cis}
      CIS_JWT_AUDIENCE: ${CIS_JWT_AUDIENCE:-developers}
      CIS_METRICS_TOKEN: ${CIS_METRICS_TOKEN:?set CIS_METRICS_TOKEN}
      CIS_LLAMA_CPP_BASE_URL: ${CIS_LLAMA_CPP_BASE_URL:-http://llamacpp:8080}
      CIS_INFERENCE_ENGINE_ID: ${CIS_INFERENCE_ENGINE_ID:-llama.cpp}
      CIS_REDIS_URL: redis://redis:6379/0
      CIS_BOOTSTRAP_USER: ${CIS_BOOTSTRAP_USER:-}
      CIS_BOOTSTRAP_GROUP: ${CIS_BOOTSTRAP_GROUP:-}
      CIS_BOOTSTRAP_TIER: ${CIS_BOOTSTRAP_TIER:-T-1}
    volumes:
      - cis-data:/data
    depends_on:
      redis:
        condition: service_healthy
      llamacpp:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  indexer:
    build: .
    command: ["python", "-m", "src.ingestion.cli"]
    profiles:
      - indexing
    environment:
      CIS_DATA_DIR: /data
      CIS_REPOSITORY_NAME: ${CIS_REPOSITORY_NAME:-project1}
      CIS_REPOSITORY_PATH: /repos/project1
      CIS_EMBEDDING_BACKEND: ${CIS_EMBEDDING_BACKEND:-nomic}
      CIS_EMBEDDING_MODEL: ${CIS_EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      CIS_EMBEDDING_TRUST_REMOTE_CODE: ${CIS_EMBEDDING_TRUST_REMOTE_CODE:-false}
    volumes:
      - cis-data:/data
      - ./:/repos/project1:ro

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  llamacpp:
    image: ${CIS_LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    entrypoint: ["/bin/sh", "/entrypoint/llamacpp-entrypoint.sh"]
    expose:
      - "8080"
    environment:
      CIS_LLAMA_CPP_PRECISION: ${CIS_LLAMA_CPP_PRECISION:-fp16}
      CIS_LLAMA_CPP_MODEL_PATH: ${CIS_LLAMA_CPP_MODEL_PATH:-}
      CIS_LLAMA_CPP_MODEL_FP16: ${CIS_LLAMA_CPP_MODEL_FP16:-}
      CIS_LLAMA_CPP_MODEL_FP8: ${CIS_LLAMA_CPP_MODEL_FP8:-}
      CIS_LLAMA_CPP_MODEL_FP4: ${CIS_LLAMA_CPP_MODEL_FP4:-}
      CIS_LLAMA_CPP_CONTEXT_WINDOW: ${CIS_LLAMA_CPP_CONTEXT_WINDOW:-4096}
      CIS_LLAMA_CPP_BATCH_SIZE: ${CIS_LLAMA_CPP_BATCH_SIZE:-1024}
      CIS_LLAMA_CPP_UBATCH_SIZE: ${CIS_LLAMA_CPP_UBATCH_SIZE:-256}
      CIS_LLAMA_CPP_N_GPU_LAYERS: ${CIS_LLAMA_CPP_N_GPU_LAYERS:-auto}
      CIS_LLAMA_CPP_FLASH_ATTN: ${CIS_LLAMA_CPP_FLASH_ATTN:-auto}
    volumes:
      - ${CIS_LLAMA_CPP_MODELS_DIR:-./models}:/models:ro
      - ./scripts/llamacpp-entrypoint.sh:/entrypoint/llamacpp-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/metrics-token:/etc/prometheus/metrics-token:ro
    depends_on:
      - gateway

volumes:
  cis-data:
